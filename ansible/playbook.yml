---
- name: Deploiement Projet 11 Streamlit depuis Harbor
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    registry: "{{ lookup('env', 'REGISTRY') | default('host.docker.internal:8080', true) }}"
    image_name: "{{ lookup('env', 'IMAGE_NAME') | default('host.docker.internal:8080/projet-mlops/projet11-mlops', true) }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
    registry_user: "{{ lookup('env', 'REGISTRY_USER') | default('admin', true) }}"
    registry_password: "{{ lookup('env', 'REGISTRY_PASSWORD') }}"
    container_name: "projet11_streamlit"
    app_port: "8501"

  tasks:
    - name: Login Harbor
      shell: echo "{{ registry_password }}" | docker login {{ registry }} -u {{ registry_user }} --password-stdin
      no_log: true
      when: registry_password | length > 0
      register: login_result
      failed_when: login_result.rc != 0

    - name: Pull image depuis Harbor
      command: docker pull {{ image_name }}:{{ image_tag }}

    - name: Arreter le conteneur existant si present
      command: docker stop {{ container_name }}
      ignore_errors: true

    - name: Supprimer le conteneur existant si present
      command: docker rm {{ container_name }}
      ignore_errors: true

    - name: Lancer le nouveau conteneur Streamlit
      command: >
        docker run -d
        --name {{ container_name }}
        -p {{ app_port }}:8501
        --restart unless-stopped
        {{ image_name }}:{{ image_tag }}

    - name: Verifier que le conteneur tourne
      command: docker ps --filter name={{ container_name }} --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
      register: container_status

    - name: Afficher le statut
      debug:
        msg: "{{ container_status.stdout }}"

    - name: Logout Harbor
      command: docker logout {{ registry }}
      ignore_errors: true
      when: registry_password | length > 0
      