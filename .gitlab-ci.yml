stages:
  - lint
  - test
  - build
  - scan
  - push
  - deploy
  - cleanup

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: ""
  PYTHONPATH: "$CI_PROJECT_DIR"
  REGISTRY: "host.docker.internal:8080"
  IMAGE_NAME: "host.docker.internal:8080/projet-mlops/projet11-mlops"
  FASTAPI_IMAGE_NAME: "host.docker.internal:8080/projet-mlops/projet11-fastapi"
  IMAGE_TAG: "$CI_PIPELINE_ID"
  PYTHON_CI_IMAGE: "host.docker.internal:8080/projet-mlops/python:3.11-slim"
  DOCKER_CI_IMAGE: "host.docker.internal:8080/projet-mlops/docker:27-cli"
  TRIVY_CI_IMAGE: "host.docker.internal:8080/projet-mlops/trivy:latest"
  ANSIBLE_CI_IMAGE: "host.docker.internal:8080/projet-mlops/ansible:latest"

cache:
  paths:
    - .cache/pip

lint:
  stage: lint
  image: "$PYTHON_CI_IMAGE"
  script:
    - python -m pip install --upgrade pip
    - pip install flake8 black
    - flake8 src tests app_streamlit.py setup_models.py --max-line-length=120 --ignore=E501,W503 --exclude=venv,__pycache__,.cache
    - black --check src tests app_streamlit.py setup_models.py

test:
  stage: test
  timeout: 23m
  image: "$PYTHON_CI_IMAGE"
  variables:
    OMP_NUM_THREADS: "1"
    OPENBLAS_NUM_THREADS: "1"
    MKL_NUM_THREADS: "1"
    NUMEXPR_NUM_THREADS: "1"
    JOBLIB_MULTIPROCESSING: "0"
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt pytest pytest-cov httpx
    - python -m nltk.downloader punkt stopwords wordnet omw-1.4 punkt_tab -d /usr/share/nltk_data || true
    - python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml --cov=src --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - test-results.xml

build:
  stage: build
  image: "$DOCKER_CI_IMAGE"
  script:
    - docker build -f Dockerfile.streamlit -t "$IMAGE_NAME:$IMAGE_TAG" -t "$IMAGE_NAME:latest" .
    - docker build -f docker/Dockerfile -t "$FASTAPI_IMAGE_NAME:$IMAGE_TAG" -t "$FASTAPI_IMAGE_NAME:latest" .
  rules:
    - if: '$CI_COMMIT_BRANCH'

scan:
  stage: scan
  image:
    name: "$TRIVY_CI_IMAGE"
    entrypoint: [""]
  variables:
    TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.trivycache"
  cache:
    key: trivy-db-cache
    paths:
      - .trivycache/
  script:
    - trivy image --timeout 15m --exit-code 0 --severity HIGH,CRITICAL "$IMAGE_NAME:$IMAGE_TAG"
    - trivy image --timeout 15m --exit-code 0 --severity HIGH,CRITICAL "$FASTAPI_IMAGE_NAME:$IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH'

push:
  stage: push
  image: "$DOCKER_CI_IMAGE"
  variables:
    DOCKER_CLIENT_TIMEOUT: "180"
    COMPOSE_HTTP_TIMEOUT: "180"
  before_script:
    - |
      retry() {
        attempts="$1"
        shift
        count=1
        until "$@"; do
          status="$?"
          if [ "$count" -ge "$attempts" ]; then
            return "$status"
          fi
          echo "Commande echouee, nouvelle tentative $count/$attempts dans 20 secondes..."
          count=$((count + 1))
          sleep 20
        done
      }
      docker_login_registry() {
        printf '%s' "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
      }
  script:
    - test -n "$REGISTRY_USER"
    - test -n "$REGISTRY_PASSWORD"
    - retry 4 docker_login_registry
    - retry 4 docker push "$IMAGE_NAME:$IMAGE_TAG"
    - retry 4 docker push "$IMAGE_NAME:latest"
    - retry 4 docker push "$FASTAPI_IMAGE_NAME:$IMAGE_TAG"
    - retry 4 docker push "$FASTAPI_IMAGE_NAME:latest"
  after_script:
    - docker logout "$REGISTRY" || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  image: "$ANSIBLE_CI_IMAGE"
  variables:
    IMAGE_NAME: "$IMAGE_NAME"
    IMAGE_TAG: "$IMAGE_TAG"
    REGISTRY: "$REGISTRY"
  before_script:
    - apk add --no-cache docker-cli || true
  script:
    - ansible-playbook -i ansible/inventory.ini ansible/playbook.yml
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

cleanup:
  stage: cleanup
  image: "$DOCKER_CI_IMAGE"
  script:
    - docker image rm "$IMAGE_NAME:$IMAGE_TAG" "$FASTAPI_IMAGE_NAME:$IMAGE_TAG" || true
    - docker builder prune -f --filter "until=24h" || true
    - docker image prune -f || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
