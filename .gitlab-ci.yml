stages:
  - lint
  - test
  - build
  - scan
  - push
  - deploy
  - cleanup

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: ""
  PYTHONPATH: "$CI_PROJECT_DIR"
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "ghcr.io/vina771/projet11-mlops"
  FASTAPI_IMAGE_NAME: "ghcr.io/vina771/projet11-fastapi"
  IMAGE_TAG: "$CI_PIPELINE_ID"

cache:
  paths:
    - .cache/pip

lint:
  stage: lint
  image: python:3.11-slim
  script:
    - python -m pip install --upgrade pip
    - pip install flake8 black
    - flake8 src tests app_streamlit.py setup_models.py --max-line-length=120 --ignore=E501,W503 --exclude=venv,__pycache__,.cache
    - black --check src tests app_streamlit.py setup_models.py

test:
  stage: test
  timeout: 8m
  image: python:3.11-slim
  variables:
    OMP_NUM_THREADS: "1"
    OPENBLAS_NUM_THREADS: "1"
    MKL_NUM_THREADS: "1"
    NUMEXPR_NUM_THREADS: "1"
    JOBLIB_MULTIPROCESSING: "0"
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt pytest pytest-cov httpx
    - python -m nltk.downloader punkt stopwords wordnet omw-1.4 punkt_tab -d /usr/share/nltk_data || true
    - python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml --cov=src --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - test-results.xml

build:
  stage: build
  image: docker:27-cli
  script:
    - docker build -f Dockerfile.streamlit -t "$IMAGE_NAME:$IMAGE_TAG" -t "$IMAGE_NAME:latest" .
    - docker build -f docker/Dockerfile -t "$FASTAPI_IMAGE_NAME:$IMAGE_TAG" -t "$FASTAPI_IMAGE_NAME:latest" .
  rules:
    - if: '$CI_COMMIT_BRANCH'

scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.trivycache"
  cache:
    key: trivy-db-cache
    paths:
      - .trivycache/
  script:
    - trivy image --timeout 15m --exit-code 0 --severity HIGH,CRITICAL "$IMAGE_NAME:$IMAGE_TAG"
    - trivy image --timeout 15m --exit-code 0 --severity HIGH,CRITICAL "$FASTAPI_IMAGE_NAME:$IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH'

push:
  stage: push
  image: docker:27-cli
  script:
    - echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
    - docker push "$IMAGE_NAME:$IMAGE_TAG"
    - docker push "$IMAGE_NAME:latest"
    - docker push "$FASTAPI_IMAGE_NAME:$IMAGE_TAG"
    - docker push "$FASTAPI_IMAGE_NAME:latest"
    - docker logout "$REGISTRY"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  image: cytopia/ansible:latest
  variables:
    IMAGE_NAME: "$IMAGE_NAME"
    IMAGE_TAG: "$IMAGE_TAG"
    REGISTRY: "$REGISTRY"
  before_script:
    - apk add --no-cache docker-cli || true
  script:
    - ansible-playbook -i ansible/inventory.ini ansible/playbook.yml
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

cleanup:
  stage: cleanup
  image: alpine:3.20
  variables:
    KEEP_VERSIONS: "5"
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      cleanup_package() {
        PACKAGE_NAME="$1"
        echo "== Nettoyage GHCR pour $PACKAGE_NAME =="
        VERSIONS=$(curl -s -H "Authorization: Bearer $GHCR_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/user/packages/container/$PACKAGE_NAME/versions?per_page=100")

        if ! echo "$VERSIONS" | jq -e 'type == "array"' > /dev/null 2>&1; then
          echo "Reponse inattendue de l'API GitHub, verifie le scope delete:packages du token :"
          echo "$VERSIONS"
          return 0
        fi

        TO_DELETE=$(echo "$VERSIONS" | jq -r '
          map(select((.metadata.container.tags // []) | index("latest") | not))
          | sort_by(.created_at) | reverse
          | .[5:] | .[].id
        ')

        if [ -z "$TO_DELETE" ]; then
          echo "Rien a supprimer pour $PACKAGE_NAME"
          return 0
        fi

        for VERSION_ID in $TO_DELETE; do
          echo "Suppression version id=$VERSION_ID de $PACKAGE_NAME"
          curl -s -X DELETE \
            -H "Authorization: Bearer $GHCR_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/$PACKAGE_NAME/versions/$VERSION_ID"
        done
      }
    - cleanup_package "projet11-mlops"
    - cleanup_package "projet11-fastapi"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: true